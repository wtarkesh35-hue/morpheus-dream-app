<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morpheus — AI Dream Interpreter</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0812;
    --deep: #10091f;
    --void: #07050f;
    --gold: #c9a84c;
    --gold-pale: #e8d5a0;
    --silver: #a8b4c8;
    --mist: #d4cce8;
    --accent: #7b5ea7;
    --glow: #9d7fd4;
    --text: #e8e0f0;
    --text-dim: #8a7fa0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Starfield */
  .starfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: var(--min-op); transform: scale(1); }
    50% { opacity: var(--max-op); transform: scale(1.4); }
  }

  /* Nebula background */
  .nebula {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(80, 30, 120, 0.35) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(20, 10, 60, 0.5) 0%, transparent 60%),
      radial-gradient(ellipse 100% 40% at 50% 50%, rgba(15, 5, 40, 0.8) 0%, transparent 100%),
      var(--void);
    pointer-events: none;
  }

  /* Floating orb */
  .orb {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(123, 94, 167, 0.12) 0%, transparent 70%);
    top: -100px;
    right: -150px;
    animation: orbFloat 20s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-40px, 60px) scale(1.05); }
    66% { transform: translate(30px, -30px) scale(0.95); }
  }

  /* Layout */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 60px 30px 100px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 70px;
    animation: fadeDown 1.2s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .sigil {
    width: 64px;
    height: 64px;
    margin: 0 auto 24px;
    position: relative;
    animation: sigil-spin 30s linear infinite;
  }

  @keyframes sigil-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .sigil svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 12px rgba(201, 168, 76, 0.6));
  }

  .brand {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.8rem, 6vw, 4.2rem);
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201, 168, 76, 0.4), 0 0 80px rgba(201, 168, 76, 0.15);
    line-height: 1;
  }

  .tagline {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--text-dim);
    margin-top: 12px;
    letter-spacing: 0.05em;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px auto 0;
    max-width: 300px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .divider-gem {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 8px var(--gold);
  }

  /* Input area */
  .input-section {
    animation: fadeUp 1.2s 0.3s ease both;
    margin-bottom: 40px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .input-label {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: block;
  }

  .dream-input {
    width: 100%;
    background: rgba(255,255,255, 0.03);
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 2px;
    padding: 22px 26px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    color: var(--text);
    resize: vertical;
    min-height: 160px;
    outline: none;
    transition: border-color 0.4s, box-shadow 0.4s, background 0.4s;
    line-height: 1.7;
  }

  .dream-input::placeholder {
    color: rgba(168, 180, 200, 0.3);
    font-style: italic;
  }

  .dream-input:focus {
    border-color: rgba(201, 168, 76, 0.5);
    box-shadow: 0 0 0 1px rgba(201, 168, 76, 0.15), inset 0 0 40px rgba(123, 94, 167, 0.05);
    background: rgba(255,255,255, 0.05);
  }

  /* Options row */
  .options-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .option-chip {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    padding: 8px 16px;
    border: 1px solid rgba(201, 168, 76, 0.25);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    border-radius: 1px;
  }

  .option-chip:hover, .option-chip.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201, 168, 76, 0.08);
    box-shadow: 0 0 16px rgba(201, 168, 76, 0.1);
  }

  /* CTA Button */
  .interpret-btn {
    margin-top: 28px;
    width: 100%;
    padding: 20px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.4s;
    border-radius: 1px;
  }

  .interpret-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201, 168, 76, 0.15), rgba(123, 94, 167, 0.15));
    opacity: 0;
    transition: opacity 0.4s;
  }

  .interpret-btn:hover::before { opacity: 1; }

  .interpret-btn:hover {
    box-shadow: 0 0 30px rgba(201, 168, 76, 0.25), inset 0 0 30px rgba(201, 168, 76, 0.05);
    text-shadow: 0 0 20px rgba(201, 168, 76, 0.5);
  }

  .interpret-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .interpret-btn span { position: relative; z-index: 1; }

  /* Loading state */
  .loading-state {
    text-align: center;
    padding: 60px 0;
    display: none;
  }

  .loading-state.visible { display: block; }

  .moon-loader {
    width: 48px;
    height: 48px;
    margin: 0 auto 20px;
    position: relative;
  }

  .moon-loader::before, .moon-loader::after {
    content: '';
    position: absolute;
    border-radius: 50%;
  }

  .moon-loader::before {
    inset: 0;
    border: 2px solid rgba(201, 168, 76, 0.2);
    animation: spin 3s linear infinite;
  }

  .moon-loader::after {
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border-top: 2px solid var(--gold);
    border-right: 2px solid transparent;
    border-bottom: 2px solid transparent;
    border-left: 2px solid transparent;
    animation: spin 1.5s ease-in-out infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--text-dim);
    font-size: 1.05rem;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Result area */
  .result-section {
    display: none;
    animation: reveal 1s ease both;
  }

  .result-section.visible { display: block; }

  @keyframes reveal {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-frame {
    border: 1px solid rgba(201, 168, 76, 0.2);
    padding: 50px 50px 44px;
    position: relative;
    background: linear-gradient(135deg, rgba(123, 94, 167, 0.06) 0%, rgba(10, 8, 18, 0.6) 100%);
  }

  /* Corner ornaments */
  .result-frame::before, .result-frame::after,
  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
  }

  .corner-tl { top: -1px; left: -1px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .corner-tr { top: -1px; right: -1px; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
  .corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

  .result-frame::before, .result-frame::after { display: none; }

  .result-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .result-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(201, 168, 76, 0.4), transparent);
  }

  .result-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 3vw, 1.9rem);
    font-weight: 400;
    color: var(--gold-pale);
    margin-bottom: 24px;
    line-height: 1.3;
    text-shadow: 0 0 30px rgba(201, 168, 76, 0.2);
  }

  .result-body {
    font-size: 1.15rem;
    line-height: 1.9;
    color: var(--text);
    font-weight: 300;
  }

  .result-body p { margin-bottom: 18px; }
  .result-body p:last-child { margin-bottom: 0; }

  /* Symbols section */
  .symbols-section {
    margin-top: 36px;
    padding-top: 30px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .symbols-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .symbol-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .symbol-pill {
    padding: 7px 16px;
    border: 1px solid rgba(157, 127, 212, 0.3);
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--glow);
    border-radius: 1px;
    background: rgba(123, 94, 167, 0.07);
  }

  /* Affirmation */
  .affirmation {
    margin-top: 32px;
    padding: 22px 28px;
    background: rgba(201, 168, 76, 0.05);
    border-left: 2px solid var(--gold);
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--gold-pale);
    line-height: 1.7;
  }

  /* New dream button */
  .new-dream-btn {
    margin-top: 32px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: color 0.3s;
    padding: 0;
  }

  .new-dream-btn:hover { color: var(--gold); }

  .new-dream-btn::before {
    content: '← ';
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 80px;
    padding-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.05);
    animation: fadeUp 1.2s 0.6s ease both;
  }

  .footer-text {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--text-dim);
    opacity: 0.6;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--void); }
  ::-webkit-scrollbar-thumb { background: rgba(201, 168, 76, 0.3); border-radius: 2px; }

  /* Error */
  .error-msg {
    padding: 16px 20px;
    border: 1px solid rgba(200, 80, 80, 0.3);
    color: #e0a0a0;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1rem;
    margin-top: 20px;
    display: none;
    background: rgba(200, 80, 80, 0.05);
  }

  .error-msg.visible { display: block; }

  @media (max-width: 600px) {
    .wrapper { padding: 40px 20px 80px; }
    .result-frame { padding: 30px 24px; }
  }
</style>
</head>
<body>

<div class="nebula"></div>
<div class="orb"></div>
<canvas class="starfield" id="stars"></canvas>

<div class="wrapper">

  <!-- Header -->
  <header class="header">
    <div class="sigil">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" stroke="#c9a84c" stroke-width="0.8" opacity="0.6"/>
        <circle cx="32" cy="32" r="22" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
        <path d="M32 4 L36 28 L60 32 L36 36 L32 60 L28 36 L4 32 L28 28 Z" stroke="#c9a84c" stroke-width="0.8" fill="rgba(201,168,76,0.08)"/>
        <circle cx="32" cy="32" r="4" fill="#c9a84c" opacity="0.8"/>
        <circle cx="32" cy="32" r="2" fill="#e8d5a0"/>
      </svg>
    </div>
    <h1 class="brand">Morpheus</h1>
    <p class="tagline">The Ancient Art of Dream Interpretation, Guided by AI</p>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-gem"></div>
      <div class="divider-line"></div>
    </div>
  </header>

  <!-- Input Section -->
  <section class="input-section" id="inputSection">
    <label class="input-label" for="dreamText">Describe your dream</label>
    <textarea
      class="dream-input"
      id="dreamText"
      placeholder="I was standing at the edge of a vast ocean at twilight, when suddenly a great white bird descended from the clouds and spoke my name..."
    ></textarea>

    <div class="options-row">
      <button class="option-chip active" data-style="jungian">Jungian</button>
      <button class="option-chip" data-style="spiritual">Spiritual</button>
      <button class="option-chip" data-style="psychological">Psychological</button>
      <button class="option-chip" data-style="symbolic">Symbolic</button>
    </div>

    <button class="interpret-btn" id="interpretBtn" onclick="interpretDream()">
      <span>✦ &nbsp; Interpret My Dream &nbsp; ✦</span>
    </button>

    <div class="error-msg" id="errorMsg"></div>
  </section>

  <!-- Loading -->
  <div class="loading-state" id="loadingState">
    <div class="moon-loader"></div>
    <p class="loading-text">Traversing the dreamscape…</p>
  </div>

  <!-- Result -->
  <section class="result-section" id="resultSection">
    <div class="result-frame">
      <div class="corner-tl"></div>
      <div class="corner-tr"></div>
      <div class="corner-bl"></div>
      <div class="corner-br"></div>

      <div class="result-label">Dream Interpretation</div>
      <h2 class="result-title" id="resultTitle"></h2>
      <div class="result-body" id="resultBody"></div>

      <div class="symbols-section" id="symbolsSection">
        <div class="symbols-label">Key Symbols Revealed</div>
        <div class="symbol-pills" id="symbolPills"></div>
      </div>

      <div class="affirmation" id="affirmation"></div>
    </div>

    <button class="new-dream-btn" onclick="resetApp()">Interpret Another Dream</button>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer-text">"In the realm of sleep, the soul speaks truths the waking mind dares not hear."</p>
  </footer>

</div>

<script>
  // Starfield
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.4 + 0.2,
      op: Math.random() * 0.6 + 0.1,
      speed: Math.random() * 0.003 + 0.001,
      phase: Math.random() * Math.PI * 2
    });
  }

  let t = 0;
  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t += 0.01;
    stars.forEach(s => {
      const opacity = s.op * (0.5 + 0.5 * Math.sin(t * s.speed * 100 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();

  // Style selection
  let selectedStyle = 'jungian';
  document.querySelectorAll('.option-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.option-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      selectedStyle = chip.dataset.style;
    });
  });

  // Interpretation
  async function interpretDream() {
    const dreamText = document.getElementById('dreamText').value.trim();
    if (!dreamText) {
      showError('Please describe your dream before seeking its meaning.');
      return;
    }

    const btn = document.getElementById('interpretBtn');
    const inputSection = document.getElementById('inputSection');
    const loadingState = document.getElementById('loadingState');
    const resultSection = document.getElementById('resultSection');
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.classList.remove('visible');
    btn.disabled = true;
    inputSection.style.display = 'none';
    loadingState.classList.add('visible');

    const styleGuides = {
      jungian: 'Use Jungian psychology: archetypes, the collective unconscious, shadow self, anima/animus, individuation.',
      spiritual: 'Use spiritual and mystical frameworks: cosmic messages, the soul\'s journey, divine symbolism, spiritual growth.',
      psychological: 'Use modern psychological analysis: subconscious processing, emotional themes, personal anxieties, desires.',
      symbolic: 'Use universal symbolism: ancient mythology, folklore, cultural symbols, elemental meanings.'
    };

    const systemPrompt = `You are Morpheus, an ancient and wise dream interpreter with deep knowledge of psychology, mythology, and the mysteries of the human mind. You interpret dreams with poetic, profound language.

${styleGuides[selectedStyle]}

Respond ONLY with a valid JSON object in this exact format (no markdown, no backticks):
{
  "title": "A poetic 4-8 word title for this dream's theme",
  "interpretation": "3-4 rich paragraphs interpreting the dream. Use beautiful, evocative language. Each paragraph on its own line.",
  "symbols": ["symbol1", "symbol2", "symbol3", "symbol4", "symbol5"],
  "affirmation": "A single meaningful closing insight or reflection — one or two sentences that resonate emotionally."
}`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: `Interpret this dream: "${dreamText}"` }]
        })
      });

      const data = await response.json();
      const raw = data.content.map(b => b.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      loadingState.classList.remove('visible');
      renderResult(parsed);

    } catch (err) {
      loadingState.classList.remove('visible');
      inputSection.style.display = 'block';
      btn.disabled = false;
      showError('The veil between worlds grows thick. Please try again.');
      console.error(err);
    }
  }

  function renderResult(data) {
    document.getElementById('resultTitle').textContent = data.title;

    const bodyEl = document.getElementById('resultBody');
    bodyEl.innerHTML = '';
    const paragraphs = data.interpretation.split('\n').filter(p => p.trim());
    paragraphs.forEach(p => {
      const el = document.createElement('p');
      el.textContent = p.trim();
      bodyEl.appendChild(el);
    });

    const pillsEl = document.getElementById('symbolPills');
    pillsEl.innerHTML = '';
    if (data.symbols && data.symbols.length) {
      data.symbols.forEach(sym => {
        const pill = document.createElement('div');
        pill.className = 'symbol-pill';
        pill.textContent = sym;
        pillsEl.appendChild(pill);
      });
      document.getElementById('symbolsSection').style.display = 'block';
    } else {
      document.getElementById('symbolsSection').style.display = 'none';
    }

    document.getElementById('affirmation').textContent = data.affirmation;

    const resultSection = document.getElementById('resultSection');
    resultSection.classList.add('visible');
    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetApp() {
    document.getElementById('resultSection').classList.remove('visible');
    document.getElementById('inputSection').style.display = 'block';
    document.getElementById('interpretBtn').disabled = false;
    document.getElementById('dreamText').value = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }
</script>
</body>
</html>
